name: Scrape NBL Data

on:
  schedule:
    - cron: '0 * * * *'  # every hour — actual decision made in "Check schedule" step
  repository_dispatch:
    types: [scrape]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout cnbl-elo
        uses: actions/checkout@v4

      - name: Check schedule
        id: check
        run: |
          # Manual dispatch always runs
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "Triggered manually — running full scrape."
            exit 0
          fi

          NEAREST=$(python3 -c "
          import json, sys
          from datetime import date
          try:
              with open('public/upcoming.json') as f:
                  matches = json.load(f)
              dates = [m['Date'] for m in matches if m.get('Date')]
              if not dates:
                  print(9999)
              else:
                  nearest = min(dates)
                  delta = (date.fromisoformat(nearest) - date.today()).days
                  print(max(0, delta))
          except Exception as e:
              print(9999)
          ")

          HOUR=$(date -u +%-H)
          echo "Days to next match: $NEAREST, Hour UTC: $HOUR"

          RUN=false
          if [ "$NEAREST" -ge 9999 ]; then
            # No upcoming data — always run to refresh
            RUN=true
          elif [ "$NEAREST" -le 0 ]; then
            # Match day — every hour
            RUN=true
          elif [ "$NEAREST" -le 1 ]; then
            # Tomorrow — 3x per day
            if [ "$HOUR" = "7" ] || [ "$HOUR" = "13" ] || [ "$HOUR" = "19" ]; then RUN=true; fi
          elif [ "$NEAREST" -le 3 ]; then
            # 2–3 days — 2x per day
            if [ "$HOUR" = "7" ] || [ "$HOUR" = "15" ]; then RUN=true; fi
          fi

          echo "run=$RUN" >> $GITHUB_OUTPUT
          if [ "$RUN" = "false" ]; then
            echo "Skipping — next match in $NEAREST days, not a scheduled run hour."
          else
            echo "Running — next match in $NEAREST days."
          fi

      - name: Checkout scraper (pokus1)
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: cechi16/pokus1
          path: scraper
          token: ${{ secrets.GH_PAT }}

      - name: Setup .NET 8
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build scraper
        if: steps.check.outputs.run == 'true'
        working-directory: scraper
        run: dotnet build -c Release

      - name: Install Playwright browsers
        if: steps.check.outputs.run == 'true'
        working-directory: scraper
        run: pwsh bin/Release/net8.0/playwright.ps1 install --with-deps chromium

      - name: Run scraper
        if: steps.check.outputs.run == 'true'
        working-directory: scraper
        env:
          OUTPUT_DIR: ${{ github.workspace }}/public
        run: dotnet run -c Release --no-build

      - name: Commit updated data
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/results.json public/upcoming.json public/odds_history.json
          git diff --staged --quiet || git commit -m "chore: auto-scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
